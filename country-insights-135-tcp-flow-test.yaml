AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Cross-region TCP 135 test (ap-northeast-2 -> us-east-2).
  Deploy first in us-east-2 (listener), then in ap-northeast-2 (sender).
Metadata:
  Instructions:
    Step0: Create two stacks in different regions: us-east-2 and ap-northeast-2
    Step1: Deploy FIRST in us-east-2 with PeerPublicIp = 0.0.0.0
    Step2: After deployment, copy the PublicIP output
    Step3: Deploy SECOND in ap-northeast-2
    Step4: Set PeerPublicIp to the us-east-2 instance public IP
    Result: ap-northeast-2 instance will send TCP 135 traffic to us-east-2
    Cleanup: Delete both stacks when finished to avoid charges
Parameters:
  PeerPublicIp:
    Type: String
    Default: 0.0.0.0
    Description: >
      Peer public IP. Use 0.0.0.0 for first deployment (us-east-2),
      then provide that IP when deploying in ap-northeast-2
  UniqueTag:
    Type: String
    Description: Unique value to avoid naming conflicts (example: firstname.lastname)
Conditions:
  HasPeerIp: !Not [ !Equals [ !Ref PeerPublicIp, "0.0.0.0" ] ]
Resources:
  # -----------------------
  # Networking
  # -----------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 172.31.0.0/16
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub country-insights-135-tcp-vpc-${UniqueTag}
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub country-insights-135-tcp-igw-${UniqueTag}
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub country-insights-135-tcp-rt-${UniqueTag}
  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 172.31.0.0/20
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub country-insights-135-tcp-subnet-${UniqueTag}
  SubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable
  # -----------------------
  # Security Group
  # -----------------------
  FlowTestSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: country-insights-135-tcp-demo SG
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub country-insights-135-tcp-sg-${UniqueTag}
      SecurityGroupIngress:
        - !If
          - HasPeerIp
          - IpProtocol: tcp
            FromPort: 135
            ToPort: 135
            CidrIp: !Sub "${PeerPublicIp}/32"
          - IpProtocol: tcp
            FromPort: 135
            ToPort: 135
            CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - !If
          - HasPeerIp
          - IpProtocol: tcp
            FromPort: 135
            ToPort: 135
            CidrIp: !Sub "${PeerPublicIp}/32"
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0
  # -----------------------
  # EC2 Instance
  # -----------------------
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t4g.nano
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-arm64-gp2}}"
      SubnetId: !Ref Subnet
      SecurityGroupIds:
        - !Ref FlowTestSG
      Tags:
        - Key: Name
          Value: !Sub country-insights-135-tcp-instance-${UniqueTag}
        - Key: Project
          Value: country-insights-135
        - Key: Unique
          Value: !Ref UniqueTag
      UserData:
        Fn::Base64:
          Fn::Join:
            - ""
            - - "#!/bin/bash\n"
              - "exec > /var/log/user-data.log 2>&1\n"
              - "echo country-insights-135-tcp-demo starting\n"
              - "PEER=\""
              - !Ref PeerPublicIp
              - "\"\n"
              - "if [ \"$PEER\" != \"0.0.0.0\" ]; then\n"
              - "  echo Sending TCP 135 traffic to peer\n"
              - "  while true; do\n"
              - "    timeout 3 bash -c \"</dev/tcp/$PEER/135\"\n"
              - "    echo Attempt\n"
              - "    sleep 5\n"
              - "  done &\n"
              - "else\n"
              - "  echo No peer IP yet (listener mode)\n"
              - "fi\n"
              - "sleep 3600\n"
              - "poweroff\n"
Outputs:
  PublicIP:
    Description: Public IP of EC2 instance (use this for second deployment)
    Value: !GetAtt Instance.PublicIp