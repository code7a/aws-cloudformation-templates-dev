                Resource: '*'
  FlowLogsFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: lanturn-create-flow-logs
      Handler: index.lambda_handler
      Code:
        ZipFile: |
          import json,boto3

          def lambda_handler(event, context):
            
            #get account number
            account_number=boto3.client('sts').get_caller_identity().get('Account')

            #for each region
            client = boto3.client('ec2')
            response = client.describe_regions()
            #print('Regions:', response['Regions'])
            Regions=response['Regions']
            for Region in Regions:
              #print(Region)
              try:
                #create log group
                client = boto3.client('logs',region_name=Region['RegionName'])
                response = client.create_log_group(logGroupName='lanturn-flowlogs')
              except: error=True
              try:
                #set 1 day retention
                client = boto3.client('logs',region_name=Region['RegionName'])
                response = client.put_retention_policy(
                    logGroupName='lanturn-flowlogs',
                    retentionInDays=1
                )
              except: error=True
              try:
                #set log group events to invoke post flows function
                client = boto3.client('logs',region_name=Region['RegionName'])
                response = client.put_subscription_filter(
                  logGroupName='lanturn-flowlogs',
                  filterName='all-events',
                  filterPattern='',
                  destinationArn='arn:aws:lambda:'+Region['RegionName']+':'+account_number+':function:lanturn-post-flows'
                )
              except: error=True
              #get vpcs
              client = boto3.client('ec2',region_name=Region['RegionName'])
              response = client.describe_vpcs()
              Vpcs=response['Vpcs']
              for Vpc in Vpcs:
                VpcId=Vpc['VpcId']
                try:
                  #create flow log
                  response = client.create_flow_logs(
                    DeliverLogsPermissionArn='arn:aws:iam::'+account_number+':role/lanturn-flow-logs',
                    LogGroupName='lanturn-flowlogs',
                    ResourceIds=[VpcId],
                    ResourceType='VPC',
                    TrafficType='ALL',
                    LogDestinationType='cloud-watch-logs'
                  )
                except: error=True
      Role:
        'Fn::Join':
          - ''
          - - 'arn:aws:iam::'
            - Ref: AWS::AccountId
            - ':role/'
            - Ref: FlowLogsRole
      Runtime: python3.12
      Timeout: 900
    DependsOn:
      - FlowLogsRole
      - PostFlowsFunction
  FlowLogsEvent:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
        - Id: 1ke4qq1h8g1huik7o4g
          Arn: !GetAtt FlowLogsFunction.Arn
    DependsOn:
      - FlowLogsFunction
  FlowLogsPermission:
