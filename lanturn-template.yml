  PostFlowsFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: lanturn-post-flows
      Handler: index.lambda_handler
      Environment: 
          Variables: 
            illumio_api_username:
              Ref: IllumioApiUsername
            illumio_api_secret:
              Ref: IllumioApiSecret
            illumio_pce_domain:
              Ref: IllumioPceDomain
            illumio_pce_port:
              Ref: IllumioPcePort
            illumio_org_id:
              Ref: IllumioOrgId
      Code:
        ZipFile: |
          import gzip,json,base64,urllib.request,ssl,os

          def lambda_handler(event, context):
            
            #get illumio variables
            #for production, set as encrypted environment variables
            illumio_pce_domain=os.environ['illumio_pce_domain']
            illumio_pce_port=os.environ['illumio_pce_port']
            illumio_org_id=os.environ['illumio_org_id']
            illumio_api_username=os.environ['illumio_api_username']
            illumio_api_secret=os.environ['illumio_api_secret']
            
            #do not verify certificate
            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE
            
            #parse cloudwatch log group flow event
            cw_data = event['awslogs']['data']
            compressed_payload = base64.b64decode(cw_data)
            uncompressed_payload = gzip.decompress(compressed_payload)
            payload = json.loads(uncompressed_payload)

            log_events = payload['logEvents']
            for log_event in log_events:

              flow=log_event['message']
              #print(flow)
              
              source_ip=flow.split()[3]
              dest_ip=flow.split()[4]
              dest_port=flow.split()[6]
              proto=flow.split()[7]
              #print(str(source_ip+','+dest_ip+','+dest_port+','+proto))

              url='https://'+illumio_pce_domain+':'+illumio_pce_port+'/api/v2/orgs/'+illumio_org_id+'/agents/bulk_traffic_flows'
              request=urllib.request.Request(url)
              base64string=base64.b64encode((illumio_api_username+':'+illumio_api_secret).encode()).decode()
              request.add_header('Authorization','Basic %s' % base64string)
              request.add_header('User-Agent','Mozilla')
              request.add_header('Content-Type','application/json')
              data=source_ip+','+dest_ip+','+dest_port+','+proto
              #print(data)
              data_bytes=json.dumps(data).encode('utf-8')
              response=urllib.request.urlopen(request,data_bytes,context=ctx).read()
              #print(response)
      Role:
        'Fn::Join':
          - ''
          - - 'arn:aws:iam::'
            - Ref: AWS::AccountId
            - ':role/'
            - Ref: PostFlowsRole
      Runtime: python3.12
      Timeout: 900
    DependsOn:
      - PostFlowsRole
  PostFlowsFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PostFlowsFunction
      Principal: logs.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:lanturn-flowlogs:*"
    DependsOn:
      - PostFlowsFunction

