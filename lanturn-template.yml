  FlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lanturn-flow-logs
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - lambda.amazonaws.com
                - vpc-flow-logs.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies: 
        - PolicyName: lanturn-flow-logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogStream'
                  - 'logs:CreateLogGroup'
                  - 'logs:PutRetentionPolicy'
                  - 'logs:PutSubscriptionFilter'
                  - 'logs:PutLogEvents'
                Resource:
                  - 'arn:aws:logs:*:*:*'
              - Effect: Allow
